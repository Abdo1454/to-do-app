<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="images/favicon-32x32.png" type="image/x-icon">
    <title>TO DO App</title>
</head>
<body>
 
        <main class="container" >
            <div class="header">
                <h1>TO DO</h1>
                <img src="images/icon-moon.svg" alt="add" id="mode-btn">
            </div>
            <form class="list" >
                <input type="text" name="task" id="task" class="task" placeholder="create a new todo...">
               <!-- <p class="ok" for="btn-task" ></p> -->
                <input type="button" value="" id="btn-task" class="ok">
            </form>
            <div class="result-page hidden" >
                <ul id="done-result"></ul>
                <ul id="result">

                </ul>
                <span class="choose">  <p id="num-tasks"></p>
    <span class="control">
    <p  id="all-items" >All</p> <p id="active" >Active</p>  <p id="completed" >completed</p> </span>
     <p id="btn-clear" >clear</p>
    </span>
   <p id="btn-clear" 
                /span>
            </div>
        </main>
  




    <script src="js/main.js"></script>
</body>
</html>
